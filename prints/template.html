<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fine Art Print – Aaron Captures</title>

  <link rel="stylesheet" href="https://use.typekit.net/ynk4toa.css" />
  <link rel="stylesheet" href="/style.css" />
</head>

<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="site-header-inner">
      <div class="site-title">
        <a href="/">Aaron Captures</a>
      </div>
      <button class="nav-toggle" aria-expanded="false">☰</button>
      <nav class="nav-menu">
        <a href="/">Home</a>
        <a href="/collections/">Collections</a>
        <a href="/prints/" class="active">Prints</a>
        <a href="/sessions/">Sessions</a>
        <a href="#contact-footer">Contact</a>
      </nav>
    </div>
  </header>

  <!-- PRINT DETAIL -->
  <section class="print-detail">
    <div class="print-detail-inner">

      <!-- IMAGE GALLERY -->
      <div class="print-gallery">
        <div class="print-image-wrapper">
          <img id="printImage" class="print-detail-image" alt="">
        </div>

        <div id="printThumbnails" class="print-thumbnails" aria-label="Print preview options"></div>
      </div>

      <!-- TEXT INFO -->
      <div class="print-info">

        <h1 id="printTitle" class="print-title"></h1>
        <p class="print-collection-label">From the <span id="printCollection"></span> collection</p>

        <p id="printDescription" class="print-description"></p>

        <div class="print-options">
          <label for="sizeSelect" class="print-select-label">Choose a Size</label>
          <select id="sizeSelect" class="print-select"></select>
        </div>

        <div class="print-options">
          <label for="frameSelect" class="print-select-label">Choose a Finish</label>
          <select id="frameSelect" class="print-select"></select>
        </div>

        <div class="selected-print-summary">
          <p id="selectedEdition"></p>
          <p id="selectedPrice" class="selected-price"></p>
        </div>

        <a id="inquiryButton" class="btn-primary purchase-btn">Inquire About This Print</a>

        <!-- NEXT / PREVIOUS BUTTONS -->
        <div class="print-nav">
          <a id="prevPrint" class="print-nav-btn" style="display:none;">← Previous</a>
          <a id="nextPrint" class="print-nav-btn" style="display:none;">Next →</a>
        </div>

        <!-- BACK LINK -->
        <a href="/prints/" class="back-prints-link nav-back">← Back to Prints</a>

      </div>

    </div>
  </section>

  <!-- FOOTER -->
  <footer class="site-footer" id="contact-footer">
    <div class="footer-inner">
      <div class="footer-logo-top">
        <img src="/assets/aaron-captures-logo.jpg" alt="">
      </div>

      <p class="footer-email"><a href="mailto:rashid.aaron@yahoo.com">rashid.aaron@yahoo.com</a></p>

      <p class="footer-social">
        <a href="https://instagram.com/aaron.captures">Instagram</a>
        <span>·</span>
        <a href="https://tiktok.com/@aaron.captures">TikTok</a>
        <span>·</span>
        <a href="https://facebook.com/aaron.capture">Facebook</a>
      </p>

      <p class="footer-copy">© 2025 Aaron Captures. All Rights Reserved.</p>
      <a href="/" class="back-home-link">← Back to Homepage</a>
    </div>
  </footer>

  <script>
    // Mobile nav toggle
    const navToggle = document.querySelector('.nav-toggle');
    const navMenu = document.querySelector('.nav-menu');

    if (navToggle && navMenu) {
      navToggle.addEventListener('click', () => {
        const isOpen = navMenu.classList.contains('nav-menu-open');
        navMenu.classList.toggle('nav-menu-open', !isOpen);
        navToggle.setAttribute("aria-expanded", !isOpen);
      });
    }
  </script>

  <!-- TEMPLATE SCRIPT -->
  <script>
    /*
      Framed price add-ons.
      Adjust these numbers once you know your actual lab/framing cost.
    */
    const FRAMING_ADD_ONS = {
      "10×20": 150,
      "12×18": 150,
      "15×30": 250,
      "16×24": 225,
      "20×30": 325,
      "20×40": 400
    };

    const FRAME_OPTIONS = [
      { id: "unframed", label: "Unframed", addOn: 0 },
      { id: "framed", label: "Framed", addOn: null }
    ];

    let selectedSize = null;
    let selectedFrame = FRAME_OPTIONS[0];
    let currentPrint = null;

    function formatPrice(value) {
      return `$${Number(value).toLocaleString()}`;
    }

    function getImageSet(print) {
      const original = print.images?.original || print.image || "";
      return [
        { id: "original", label: "Original", src: original },
        { id: "framed", label: "Framed", src: print.images?.framed || "" },
        { id: "room", label: "In Room", src: print.images?.room || "" }
      ];
    }

    function renderImageGallery(print) {
      const mainImage = document.getElementById('printImage');
      const thumbnails = document.getElementById('printThumbnails');
      const imageSet = getImageSet(print);
      const availableImages = imageSet.filter(img => img.src && img.src.trim() !== "");

      thumbnails.innerHTML = "";

      if (availableImages.length === 0) return;

      mainImage.src = availableImages[0].src;
      mainImage.alt = `${print.title} - ${availableImages[0].label}`;

      availableImages.forEach((image, index) => {
        const button = document.createElement('button');
        button.type = "button";
        button.className = index === 0 ? "print-thumbnail active" : "print-thumbnail";
        button.setAttribute("aria-label", `View ${image.label} preview`);
        button.innerHTML = `
          <img src="${image.src}" alt="${print.title} ${image.label} preview">
          <span>${image.label}</span>
        `;

        button.addEventListener('click', () => {
          mainImage.src = image.src;
          mainImage.alt = `${print.title} - ${image.label}`;

          document.querySelectorAll('.print-thumbnail').forEach(btn => {
            btn.classList.remove('active');
          });
          button.classList.add('active');
        });

        thumbnails.appendChild(button);
      });
    }

    function getFrameAddOn(sizeLabel) {
      if (selectedFrame.id === "unframed") return 0;
      return FRAMING_ADD_ONS[sizeLabel] || 0;
    }

    function updateSelectedSummary() {
      if (!selectedSize) return;

      const addOn = getFrameAddOn(selectedSize.size);
      const totalPrice = selectedSize.price + addOn;

      document.getElementById('selectedEdition').textContent =
        `${selectedSize.size} · Edition of ${selectedSize.edition} · ${selectedFrame.label}`;

      document.getElementById('selectedPrice').textContent =
        formatPrice(totalPrice);

      const inquiryBtn = document.getElementById('inquiryButton');
      const subject = `Print Inquiry – ${currentPrint.title}`;
      const body =
        `Hi Aaron,%0D%0A%0D%0A` +
        `I'm interested in this print:%0D%0A` +
        `Title: ${currentPrint.title}%0D%0A` +
        `Size: ${selectedSize.size}%0D%0A` +
        `Finish: ${selectedFrame.label}%0D%0A` +
        `Price shown: ${formatPrice(totalPrice)}%0D%0A%0D%0A` +
        `Please send me more information.`;

      inquiryBtn.href =
        `mailto:rashid.aaron@yahoo.com?subject=${encodeURIComponent(subject)}&body=${body}`;
    }

    function renderSizeOptions(print) {
      const sizeSelect = document.getElementById('sizeSelect');
      sizeSelect.innerHTML = "";

      selectedSize = print.sizes[0];

      print.sizes.forEach((size, index) => {
        const option = document.createElement('option');
        option.value = index;
        option.textContent = `${size.size} · Edition of ${size.edition} · ${formatPrice(size.price)}`;
        sizeSelect.appendChild(option);
      });

      sizeSelect.value = "0";
      sizeSelect.addEventListener('change', () => {
        selectedSize = print.sizes[Number(sizeSelect.value)];
        updateSelectedSummary();
      });
    }

    function renderFrameOptions() {
      const frameSelect = document.getElementById('frameSelect');
      frameSelect.innerHTML = "";

      selectedFrame = FRAME_OPTIONS[0];

      FRAME_OPTIONS.forEach((frame, index) => {
        const option = document.createElement('option');
        option.value = index;

        const subText = frame.id === "unframed"
          ? "Archival paper print only"
          : "Mat + frame add-on";

        option.textContent = `${frame.label} · ${subText}`;
        frameSelect.appendChild(option);
      });

      frameSelect.value = "0";
      frameSelect.addEventListener('change', () => {
        selectedFrame = FRAME_OPTIONS[Number(frameSelect.value)];
        updateSelectedSummary();
      });
    }

    async function loadPrint() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('print');

      if (!slug) {
        document.querySelector('.print-detail-inner').innerHTML =
          "<p>Missing print identifier.</p>";
        return;
      }

      const response = await fetch('/prints/prints.json');
      const prints = await response.json();

      const print = prints.find(p => p.slug === slug);
      if (!print) {
        document.querySelector('.print-detail-inner').innerHTML =
          "<p>Print not found.</p>";
        return;
      }

      currentPrint = print;

      // Fill content
      document.title = print.title + " – Fine Art Print";
      document.getElementById('printTitle').textContent = print.title;
      document.getElementById('printCollection').textContent = print.collection;
      document.getElementById('printDescription').textContent = print.description;

      renderImageGallery(print);
      renderSizeOptions(print);
      renderFrameOptions();
      updateSelectedSummary();

      // NEXT / PREVIOUS
      const index = prints.findIndex(p => p.slug === slug);

      const prevBtn = document.getElementById('prevPrint');
      const nextBtn = document.getElementById('nextPrint');

      if (index > 0) {
        prevBtn.href = `/prints/template.html?print=${prints[index - 1].slug}`;
        prevBtn.style.display = "inline-block";
      }

      if (index < prints.length - 1) {
        nextBtn.href = `/prints/template.html?print=${prints[index + 1].slug}`;
        nextBtn.style.display = "inline-block";
      }
    }

    loadPrint();
  </script>

</body>
</html>
